name: CI

on:
    pull_request: {}
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    commits:
        name: Commits
        uses: NixySoftware/.github/.github/workflows/commits.yml@e4cce7beed9cf44052c57e416e15cc25f6617eb8

    rust:
        name: Rust
        uses: NixySoftware/.github/.github/workflows/rust.yml@e4cce7beed9cf44052c57e416e15cc25f6617eb8

    typescript:
        name: TypeScript
        uses: NixySoftware/.github/.github/workflows/typescript.yml@e4cce7beed9cf44052c57e416e15cc25f6617eb8

    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run make
              working-directory: packages/supermarket-authenticator
